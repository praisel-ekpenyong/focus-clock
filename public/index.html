<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#101010">
  <meta name="description" content="All your time tools in one place.">
  <title>Focus Clock</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="#/timezones" class="sidebar-link" data-route="/timezones" title="Timezones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </a>
        <a href="#/pomodoro" class="sidebar-link active" data-route="/pomodoro" title="Pomodoro">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13,2a11.32,11.32,0,0,0-1,2c-.12.33-.22.66-.31,1C11.07,3.26,8.19,3.54,7,3c0,3.38,3.52,2.21,4.25,2.72C8.42,5.48,7.39,7.39,6,8c3.1,1.57,5,.06,5.72-1.84-.11.74-.65,4.92,2.28,4.84a8.14,8.14,0,0,0-1.31-4.91h.06C14,7.59,15.94,9.3,18,8a7.19,7.19,0,0,0-3.75-2.06C15.84,6,16.91,6.13,18,4a8.42,8.42,0,0,0-4.69,1c.47-.8,1.18-2,1.69-3ZM7,5c-3.91.89-5,4.23-5,8C2,18,6.47,22,12,22c4.89,0,10-2.84,10-10,0-3-1.17-6-4-7a1.88,1.88,0,0,1-1,1c.54.19,1.42,1.39,2,2-.31.81-1.8,1.52-4.34,1a9.86,9.86,0,0,1,0,3,4.07,4.07,0,0,1-4-3C8.25,10.5,4.93,8.68,5,8c.88-.61,2-1.83,3-2A2.82,2.82,0,0,1,7,5Z"/></svg>
        </a>
        <a href="#/daily-planner" class="sidebar-link" data-route="/daily-planner" title="Daily Planner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </a>
        <a href="#/time" class="sidebar-link" data-route="/time" title="World Clock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
        <a href="#/timer" class="sidebar-link" data-route="/timer" title="Timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6M12 2v2"/></svg>
        </a>
        <a href="#/stopwatch" class="sidebar-link" data-route="/stopwatch" title="Stopwatch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M10 2h4"/></svg>
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="header">
        <div class="header-left">
          <button class="menu-btn" id="menuBtn" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item">Pomodoro</span>
          </div>
        </div>
        <div class="header-right">
          <button class="header-link upgrade-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Login / Sign Up for more
          </button>
          <a href="#" class="header-link">Feedback</a>
          <div class="focus-sounds">
            <button class="header-link" id="focusSoundsBtn">Focus</button>
            <div class="dropdown hidden" id="focusSoundsDropdown">
              <button data-sound="none">None</button>
              <button data-sound="rain">Rain</button>
              <button data-sound="white">White Noise</button>
              <button data-sound="forest">Forest</button>
            </div>
          </div>
          <span class="header-clock" id="headerClock">12:00 AM</span>
          <button class="header-link hour-format-btn" id="hourFormatBtn">12hr</button>
        </div>
      </header>

      <main class="page-outlet" id="pageOutlet"></main>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
